<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="#0B1120"/>
  
  <!-- Decorative glow -->
  <circle cx="400" cy="300" r="280" fill="url(#glow)" opacity="0.15"/>
  
  <!-- Calendar card -->
  <rect x="120" y="80" width="320" height="400" rx="20" fill="#151D2E" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  
