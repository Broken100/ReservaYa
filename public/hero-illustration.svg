  <circle cx="156" cy="112" r="6" fill="#3B82F6"/>
  <circle cx="180" cy="112" r="6" fill="#60A5FA" opacity="0.5"/>
  <circle cx="204" cy="112" r="6" fill="#60A5FA" opacity="0.5"/>
  
  <!-- Calendar grid -->
