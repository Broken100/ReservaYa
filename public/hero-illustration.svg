    <rect x="356" y="168" width="36" height="36" rx="8" fill="#1E293B"/>
    
    <rect x="148" y="220" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="200" y="220" width="36" height="36" rx="8" fill="#3B82F6"/>
    <rect x="252" y="220" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="304" y="220" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="356" y="220" width="36" height="36" rx="8" fill="#1E293B"/>
    
    <rect x="148" y="272" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="200" y="272" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="252" y="272" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="304" y="272" width="36" height="36" rx="8" fill="#10B981"/>
    <rect x="356" y="272" width="36" height="36" rx="8" fill="#1E293B"/>
    
    <rect x="148" y="324" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="200" y="324" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="252" y="324" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="304" y="324" width="36" height="36" rx="8" fill="#1E293B"/>
    <rect x="356" y="324" width="36" height="36" rx="8" fill="#1E293B"/>
  </g>
  
  <!-- Checkmark on green date -->
  <path d="M316 284l6 6 10-10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Clock card -->
  <rect x="480" y="120" width="220" height="160" rx="16" fill="#151D2E" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
