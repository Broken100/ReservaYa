  <rect x="554" y="366" width="72" height="4" rx="2" fill="#1E293B"/>
  
  <rect x="510" y="394" width="160" height="40" rx="10" fill="#1E293B"/>
  <circle cx="534" cy="414" r="10" fill="#F59E0B"/>
  <rect x="528" y="410" width="4" height="8" rx="2" fill="white"/>
  <rect x="536" y="408" width="4" height="12" rx="2" fill="white"/>
  <rect x="554" y="408" width="96" height="6" rx="3" fill="#F59E0B" opacity="0.3"/>
  <rect x="554" y="420" width="72" height="4" rx="2" fill="#1E293B"/>
  
  <!-- Floating elements -->
  <rect x="380" y="420" width="140" height="52" rx="12" fill="#151D2E" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <circle cx="410" cy="446" r="14" fill="#3B82F6" opacity="0.15"/>
  <path d="M404 446l4 4 8-8" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="436" y="438" width="64" height="6" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="436" y="450" width="48" height="4" rx="2" fill="#1E293B"/>
  
  <!-- Bottom bar chart -->
  <rect x="120" y="460" width="200" height="80" rx="12" fill="#151D2E" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <rect x="144" y="500" width="16" height="24" rx="4" fill="#3B82F6" opacity="0.4"/>
  <rect x="172" y="488" width="16" height="36" rx="4" fill="#3B82F6" opacity="0.6"/>
  <rect x="200" y="476" width="16" height="48" rx="4" fill="#3B82F6"/>
  <rect x="228" y="492" width="16" height="32" rx="4" fill="#3B82F6" opacity="0.5"/>
  <rect x="256" y="484" width="16" height="40" rx="4" fill="#3B82F6" opacity="0.7"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0B1120"/>
